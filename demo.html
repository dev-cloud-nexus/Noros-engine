<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Noros Engine 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            height: 100vh;
            height: 100dvh;
            background: #000;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(99, 102, 241, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 8px;
            color: #6366f1;
            font-weight: bold;
            font-size: 16px;
            pointer-events: auto;
            touch-action: auto;
            z-index: 101;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
            touch-action: auto;
            z-index: 101;
        }

        button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
            min-width: 120px;
            min-height: 44px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.2);
        }

        #resetBtn {
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        #resetBtn:active {
            box-shadow: 0 2px 10px rgba(236, 72, 153, 0.2);
        }

        .info {
            position: absolute;
            bottom: 90px;
            left: 10px;
            right: 10px;
            background: rgba(99, 102, 241, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 8px;
            color: #a5b4fc;
            font-size: 12px;
            pointer-events: auto;
            touch-action: auto;
            border: 1px solid rgba(99, 102, 241, 0.2);
            z-index: 101;
        }

        .gesture-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="ui">
        <div class="header">⚙️ Noros Engine</div>
        
        <div class="gesture-hint">
            👆 Glissez pour tourner<br>
            🤏 Pincez pour zoomer
        </div>
        
        <div class="controls">
            <button id="importBtn">📤 Importer</button>
            <button id="resetBtn">🔄 Reset</button>
        </div>

        <div class="info">
            💡 Écran 100% tactile - Glissez n'importe où pour tourner l'objet
        </div>
    </div>

    <input type="file" id="fileInput" accept=".glb,.gltf" style="display: none;">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        // Camera setup
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.z = 3;

        // Renderer setup
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ 
            canvas, 
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.domElement.style.touchAction = 'none';

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0x6366f1, 0.5, 100);
        pointLight.position.set(-10, 10, -10);
        scene.add(pointLight);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 4;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1.5;
        controls.maxDistance = 10;
        
        // Touch controls configuration
        controls.touches = {
            ONE: THREE.TOUCH.ROTATE,
            TWO: THREE.TOUCH.DOLLY_PAN
        };

        // Default scene with Torus Knot
        const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
        const material = new THREE.MeshNormalMaterial();
        let mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        let currentModel = null;
        const loader = new GLTFLoader();

        // Touch event handlers
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            controls.autoRotate = false;
        }, { passive: true });

        canvas.addEventListener('touchend', () => {
            setTimeout(() => {
                controls.autoRotate = true;
            }, 1000);
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // Button events
        document.getElementById('importBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('importBtn').addEventListener('touchend', (e) => {
            e.stopPropagation();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            resetScene();
        });

        document.getElementById('resetBtn').addEventListener('touchend', (e) => {
            e.stopPropagation();
        });

        function resetScene() {
            // Remove model
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }

            // Remove default mesh if it exists
            if (mesh && scene.children.includes(mesh)) {
                scene.remove(mesh);
            }

            // Add new default mesh
            const newGeometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
            const newMaterial = new THREE.MeshNormalMaterial();
            mesh = new THREE.Mesh(newGeometry, newMaterial);
            scene.add(mesh);

            // Reset camera
            camera.position.z = 3;
            controls.reset();
            controls.autoRotate = true;
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.name.endsWith('.glb') && !file.name.endsWith('.gltf')) {
                alert('Sélectionnez un fichier .glb ou .gltf');
                return;
            }

            const url = URL.createObjectURL(file);
            loader.load(url, (gltf) => {
                // Remove default mesh
                if (scene.children.includes(mesh)) {
                    scene.remove(mesh);
                }

                // Remove previous model
                if (currentModel) {
                    scene.remove(currentModel);
                }

                currentModel = gltf.scene;
                scene.add(currentModel);

                // Auto-fit camera
                const box = new THREE.Box3().setFromObject(currentModel);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);

                currentModel.position.sub(center);

                const fov = camera.fov * (Math.PI / 180);
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                cameraZ *= 1.5;

                camera.position.z = cameraZ;
                camera.updateProjectionMatrix();
                controls.reset();
                controls.autoRotate = true;
            });

            document.getElementById('fileInput').value = '';
        });

        // Handle resize
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        // Prevent default touch behaviors
        document.addEventListener('gesturestart', (e) => {
            e.preventDefault();
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
