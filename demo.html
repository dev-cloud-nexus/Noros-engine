<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noros Engine - 3D Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #0a0e27;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(99, 102, 241, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #c7d2fe;
            font-size: 20px;
            font-weight: bold;
        }

        .button-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #resetBtn {
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
        }

        input[type="file"] {
            display: none;
        }

        .status {
            position: absolute;
            top: 80px;
            left: 20px;
            color: #a5b4fc;
            font-size: 12px;
            background: rgba(99, 102, 241, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 250px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="header">⚙️ Noros Engine</div>
    
    <div class="button-container">
        <button id="importBtn">📤 Importer .glb</button>
        <button id="resetBtn">🔄 Réinitialiser</button>
    </div>

    <div class="status">
        💡 Cliquez sur "Importer .glb" pour charger votre modèle
    </div>

    <input type="file" id="fileInput" accept=".glb,.gltf" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, controls, currentModel;

        // Initialize Three.js
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0e27);

            // Camera setup
            camera = new THREE.PerspectiveCamera(
                50,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.z = 3;

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.autoRotate = true;
            controls.autoRotateSpeed = 4;
            controls.enableZoom = true;

            // Create default scene
            addDefaultObjects();

            // Event listeners
            document.getElementById('importBtn').addEventListener('click', function() {
                console.log('Import button clicked');
                document.getElementById('fileInput').click();
            });

            document.getElementById('resetBtn').addEventListener('click', function() {
                console.log('Reset button clicked');
                resetScene();
            });

            document.getElementById('fileInput').addEventListener('change', function(e) {
                console.log('File selected:', e.target.files[0]);
                handleFileUpload(e);
            });

            // Handle window resize
            window.addEventListener('resize', function() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Animation loop
            animate();
        }

        function addDefaultObjects() {
            // Torus
            const torusGeo = new THREE.TorusGeometry(1, 0.3, 64, 100);
            const torusMat = new THREE.MeshPhongMaterial({ 
                color: 0x6366f1, 
                shininess: 100 
            });
            const torus = new THREE.Mesh(torusGeo, torusMat);
            torus.name = 'default';
            scene.add(torus);

            // Box
            const boxGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const boxMat = new THREE.MeshPhongMaterial({ 
                color: 0xec4899, 
                shininess: 100 
            });
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.position.y = 0.5;
            box.name = 'default';
            scene.add(box);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            console.log('Loading file:', file.name);

            if (!file.name.endsWith('.glb') && !file.name.endsWith('.gltf')) {
                alert('Veuillez sélectionner un fichier .glb ou .gltf');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                console.log('File read, parsing...');
                const loader = new THREE.GLTFLoader();
                
                loader.parse(e.target.result, '', function(gltf) {
                    console.log('Model parsed successfully');
                    
                    // Remove previous model
                    if (currentModel) {
                        scene.remove(currentModel);
                    }

                    // Remove default objects
                    const toRemove = scene.children.filter(obj => obj.name === 'default');
                    toRemove.forEach(obj => scene.remove(obj));

                    // Add new model
                    currentModel = gltf.scene;
                    scene.add(currentModel);

                    // Center and scale
                    const box = new THREE.Box3().setFromObject(currentModel);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);

                    currentModel.position.sub(center);

                    const scale = 2 / maxDim;
                    currentModel.scale.multiplyScalar(scale);

                    console.log('Model loaded and positioned');
                });
            };

            reader.readAsArrayBuffer(file);
        }

        function resetScene() {
            console.log('Resetting scene');
            
            // Remove all objects
            while (scene.children.length > 0) {
                scene.remove(scene.children[0]);
            }

            // Re-add lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            // Add default objects
            addDefaultObjects();

            // Reset model reference
            currentModel = null;

            // Reset camera
            camera.position.z = 3;
            controls.reset();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Start
        window.addEventListener('load', init);
    </script>
</body>
</html>
