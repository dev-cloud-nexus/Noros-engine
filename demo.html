<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noros Engine - 3D Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0e27;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            z-index: 100;
        }

        .header {
            display: flex;
            justify-content: center;
            pointer-events: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            background: rgba(99, 102, 241, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #c7d2fe;
            animation: float 3s ease-in-out infinite;
        }

        .logo-text {
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            pointer-events: auto;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            font-size: 14px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #fileInput {
            display: none;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
            max-width: 300px;
        }

        .info-item {
            padding: 10px 16px;
            background: rgba(99, 102, 241, 0.08);
            border-left: 3px solid #6366f1;
            border-radius: 8px;
            font-size: 12px;
            color: #a5b4fc;
        }

        .info-label {
            font-weight: 600;
            color: #c7d2fe;
            display: block;
            margin-bottom: 4px;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 200;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #a5b4fc;
            margin-top: 10px;
        }

        .error-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #dc2626;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            display: none;
            z-index: 300;
            animation: slideIn 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .logo-text { display: none; }
            .btn { padding: 10px 16px; font-size: 12px; }
            .info { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui-container">
        <div class="header">
            <div class="logo">
                <span>⚙️</span>
                <span class="logo-text">Noros Engine</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="importBtn">📤 Importer .glb</button>
            <button class="btn" id="resetBtn" style="background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);">🔄 Réinitialiser</button>
            <input type="file" id="fileInput" accept=".glb,.gltf" />
        </div>

        <div class="info">
            <div class="info-item">
                <span class="info-label">💡 Conseil:</span>
                <span>Importez un modèle .glb depuis votre ordi</span>
            </div>
            <div class="info-item">
                <span class="info-label">🎮 Contrôles:</span>
                <span>Glisser pour tourner • Scroll pour zoomer</span>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Chargement du modèle...</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, controls, currentModel;
        const loader = new THREE.GLTFLoader();

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 4000);
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0e27);

            // Camera
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
            camera.position.set(0, 0, 3);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(10, 15, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const pointLight1 = new THREE.PointLight(0x6366f1, 0.5, 100);
            pointLight1.position.set(-10, 10, -10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0xec4899, 0.3, 100);
            pointLight2.position.set(10, -10, 10);
            scene.add(pointLight2);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.autoRotate = true;
            controls.autoRotateSpeed = 4;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.minDistance = 1.5;
            controls.maxDistance = 15;
            controls.makeDefault = true;

            // Default scene
            createDefaultScene();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            document.getElementById('importBtn').addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });
            document.getElementById('resetBtn').addEventListener('click', resetScene);
            document.getElementById('fileInput').addEventListener('change', handleFileUpload);

            // Animation loop
            animate();
        }

        function createDefaultScene() {
            // Torus
            const torusGeometry = new THREE.TorusGeometry(1, 0.3, 64, 100);
            const torusMaterial = new THREE.MeshStandardMaterial({
                color: 0x6366f1,
                metalness: 0.8,
                roughness: 0.2,
                emissive: 0x4f46e5,
                emissiveIntensity: 0.3
            });
            const torus = new THREE.Mesh(torusGeometry, torusMaterial);
            torus.castShadow = true;
            torus.name = 'defaultScene';
            scene.add(torus);

            // Box
            const boxGeometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const boxMaterial = new THREE.MeshStandardMaterial({
                color: 0xec4899,
                metalness: 0.6,
                roughness: 0.3,
                emissive: 0xbe185d,
                emissiveIntensity: 0.2
            });
            const box = new THREE.Mesh(boxGeometry, boxMaterial);
            box.position.y = 0.5;
            box.castShadow = true;
            box.name = 'defaultScene';
            scene.add(box);
        }

        function resetScene() {
            // Remove current model
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }

            // Remove default objects if needed
            scene.children.forEach(child => {
                if (child.name === 'defaultScene') {
                    scene.remove(child);
                }
            });

            // Recreate default scene
            createDefaultScene();

            // Reset camera
            camera.position.set(0, 0, 3);
            camera.updateProjectionMatrix();
            controls.autoRotate = true;

            document.getElementById('fileInput').value = '';
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.name.endsWith('.glb') && !file.name.endsWith('.gltf')) {
                showError('❌ Veuillez sélectionner un fichier .glb ou .gltf');
                return;
            }

            showLoading(true);

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const arrayBuffer = e.target.result;
                    loader.parse(arrayBuffer, '', (gltf) => {
                        // Remove previous model
                        if (currentModel) {
                            scene.remove(currentModel);
                        }

                        // Remove default objects
                        scene.children = scene.children.filter(child => child.name !== 'defaultScene');

                        currentModel = gltf.scene;
                        scene.add(currentModel);

                        // Adapt camera to model
                        const box = new THREE.Box3().setFromObject(currentModel);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());

                        currentModel.position.sub(center);

                        const maxDim = Math.max(size.x, size.y, size.z);
                        const fov = camera.fov * (Math.PI / 180);
                        let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                        cameraZ *= 1.5;

                        camera.position.z = cameraZ;
                        camera.near = cameraZ / 100;
                        camera.far = cameraZ * 100;
                        camera.updateProjectionMatrix();

                        controls.autoRotate = true;
                        controls.target.set(0, 0, 0);
                        controls.update();

                        showLoading(false);
                        console.log('✅ Modèle chargé avec succès!');
                    });
                } catch (err) {
                    showLoading(false);
                    showError('❌ Erreur lors du chargement du modèle');
                    console.error(err);
                }
            };

            reader.onerror = () => {
                showLoading(false);
                showError('❌ Erreur lors de la lecture du fichier');
            };

            reader.readAsArrayBuffer(file);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Start when ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
