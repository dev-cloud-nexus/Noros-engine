<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noros Engine - 3D Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0e27;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            z-index: 100;
        }

        .header {
            display: flex;
            justify-content: center;
            pointer-events: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            background: rgba(99, 102, 241, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #c7d2fe;
            animation: float 3s ease-in-out infinite;
        }

        .logo-text {
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            pointer-events: auto;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #fileInput {
            display: none;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
            max-width: 300px;
        }

        .info-item {
            padding: 10px 16px;
            background: rgba(99, 102, 241, 0.08);
            border-left: 3px solid #6366f1;
            border-radius: 8px;
            font-size: 12px;
            color: #a5b4fc;
        }

        .info-label {
            font-weight: 600;
            color: #c7d2fe;
            display: block;
            margin-bottom: 4px;
        }

        @media (max-width: 768px) {
            .logo-text { display: none; }
            .btn { padding: 10px 16px; font-size: 12px; }
            .info { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui-container">
        <div class="header">
            <div class="logo">
                <span>⚙️</span>
                <span class="logo-text">Noros Engine</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="importBtn">📤 Importer .glb</button>
            <input type="file" id="fileInput" accept=".glb,.gltf" />
        </div>

        <div class="info">
            <div class="info-item">
                <span class="info-label">💡 Conseil:</span>
                <span>Importez un modèle .glb</span>
            </div>
            <div class="info-item">
                <span class="info-label">🎮 Contrôles:</span>
                <span>Glisser pour tourner, Scroll pour zoomer</span>
            </div>
        </div>
    </div>

    <script async src="https://cdn.jsdelivr.net/npm/three@r160/build/three.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r160/examples/js/controls/OrbitControls.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r160/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, controls, currentModel;

        // Attendre le chargement de Three.js
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0e27);

            // Camera
            camera = new THREE.PerspectiveCamera(
                50,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0, 3);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(10, 15, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const pointLight1 = new THREE.PointLight(0x6366f1, 0.5);
            pointLight1.position.set(-10, 10, -10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0xec4899, 0.3);
            pointLight2.position.set(10, -10, 10);
            scene.add(pointLight2);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.autoRotate = true;
            controls.autoRotateSpeed = 4;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.minDistance = 1.5;
            controls.maxDistance = 15;

            // Default scene
            createDefaultScene();

            // Events
            window.addEventListener('resize', onWindowResize);
            document.getElementById('importBtn').addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });
            document.getElementById('fileInput').addEventListener('change', handleFileUpload);

            // Animation loop
            animate();
        }

        function createDefaultScene() {
            // Torus
            const torusGeometry = new THREE.TorusGeometry(1, 0.3, 64, 100);
            const torusMaterial = new THREE.MeshStandardMaterial({
                color: 0x6366f1,
                metalness: 0.8,
                roughness: 0.2,
                emissive: 0x4f46e5,
                emissiveIntensity: 0.3
            });
            const torus = new THREE.Mesh(torusGeometry, torusMaterial);
            torus.castShadow = true;
            scene.add(torus);

            // Box
            const boxGeometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const boxMaterial = new THREE.MeshStandardMaterial({
                color: 0xec4899,
                metalness: 0.6,
                roughness: 0.3,
                emissive: 0xbe185d,
                emissiveIntensity: 0.2
            });
            const box = new THREE.Mesh(boxGeometry, boxMaterial);
            box.position.y = 0.5;
            box.castShadow = true;
            scene.add(box);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.name.endsWith('.glb') && !file.name.endsWith('.gltf')) {
                alert('Veuillez sélectionner un fichier .glb ou .gltf');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const loader = new THREE.GLTFLoader();
                loader.parse(e.target.result, '', (gltf) => {
                    // Supprimer le modèle précédent
                    if (currentModel) {
                        scene.remove(currentModel);
                    }

                    currentModel = gltf.scene;
                    scene.add(currentModel);

                    // Adapter la caméra
                    const box = new THREE.Box3().setFromObject(currentModel);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());

                    currentModel.position.sub(center);

                    const maxDim = Math.max(size.x, size.y, size.z);
                    const fov = camera.fov * (Math.PI / 180);
                    let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                    cameraZ *= 1.5;

                    camera.position.z = cameraZ;
                    camera.near = cameraZ / 100;
                    camera.far = cameraZ * 100;
                    camera.updateProjectionMatrix();

                    controls.autoRotate = true;
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Démarrer quand Three.js est chargé
        setTimeout(() => {
            if (window.THREE) {
                init();
            } else {
                setTimeout(arguments.callee, 100);
            }
        }, 100);
    </script>
</body>
</html>
